# GM Stream Control — Nginx-RTMP config
# This file is managed by the FastAPI backend (write_nginx_config_and_reload).
# Initial version has no push destinations — add them via the control panel.

worker_processes auto;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;

            # Notify backend when ATEM connects / disconnects
            on_publish http://127.0.0.1:8000/api/stream/on_publish;
            on_done    http://127.0.0.1:8000/api/stream/on_done;

            # Push destinations are injected here by the backend
            # when you click Start Stream in the control panel
        }
    }
}

http {
    server {
        listen 8080;

        # Nginx-RTMP stats endpoint (polled by backend every 5s)
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/share/doc/libnginx-mod-rtmp;
        }
    }
}
